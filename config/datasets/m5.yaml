# Demo target dataset: M5 Forecasting / Walmart sales (hierarchical).
# https://www.kaggle.com/competitions/m5-forecasting-accuracy
name: m5
date_col: date
target_col: sales
series_id_cols:
  - store_id
  - item_id
exogenous_cols:
  - sell_price
  - event_name_1
  - snap_flag
horizon: 28
freq: D
holiday_country: US
# Daily feature suite (matches HANDOFF: t-1/7/14/28 lags, 7/28-day rolling).
features:
  lags: [1, 7, 14, 28]
  rolling_windows: [7, 28]
  fourier:
    - period: 7        # weekly seasonality
      order: 3
    - period: 365.25   # yearly seasonality
      order: 6
  exogenous_lag: 1
  use_exogenous: true
