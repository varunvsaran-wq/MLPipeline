# Phase 1 prototype dataset: Kaggle Avocado prices.
# https://www.kaggle.com/datasets/neuromusic/avocado-prices
name: avocado
raw_file: avocado.csv
date_col: Date
target_col: AveragePrice
series_id_cols:
  - region
  - type
exogenous_cols:
  - "Total Volume"
horizon: 12        # ~3 months of weekly points held out for validation
freq: W            # avocado data is weekly
holiday_country: US
# Phase 1 univariate baseline operates on one clean weekly series.
default_series:
  region: TotalUS
  type: conventional
# Phase 2 tabular feature suite. Units are weekly steps (freq: W).
features:
  lags: [1, 2, 3, 4, 8, 12, 52]
  rolling_windows: [4, 8, 12, 52]
  fourier:
    - period: 52.143   # yearly seasonality on weekly data (365.25/7)
      order: 4
  exogenous_lag: 1
  use_exogenous: true
